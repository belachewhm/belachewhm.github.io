<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Billy Haile-Mariam</title>
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/v4-shims.min.css">
    <link rel="stylesheet" href="css/creative.css">
    <link rel="stylesheet" href="custom.css">
    <style>
        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 1rem 2rem;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
        }
        .login-card .brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-card .brand a {
            font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            color: #F05F40;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        .login-card .brand a:hover {
            color: #eb3812;
        }
        .login-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            color: #222;
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #444;
        }
        .form-control:focus {
            border-color: #F05F40;
            box-shadow: 0 0 0 0.2rem rgba(240, 95, 64, 0.2);
        }
        .btn-login {
            background-color: #F05F40;
            border: none;
            color: white;
            font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 300px;
            padding: 0.65rem 1.5rem;
            width: 100%;
            transition: background-color 0.35s;
        }
        .btn-login:hover, .btn-login:focus {
            background-color: #eb3812;
            color: white;
        }
        .back-link {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.875rem;
        }
        .back-link a {
            color: #F05F40;
        }
        .back-link a:hover {
            color: #eb3812;
        }
    </style>
</head>
<body>
    <nav id="mainNav" class="navbar navbar-expand-md fixed-top scrolled">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Billy Haile-Mariam</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#technical-strengths">Tech</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#experience">Experience</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#education">Education</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#resume">Resume</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="tetris.html">Tetris</a></li>
                    <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <div class="login-card">
            <div id="error-alert" class="alert alert-danger d-none" role="alert">
                <i class="fa fa-exclamation-circle me-2"></i>
                Invalid username or password. Please try again.
            </div>

            <img id="error-gif" src="" alt="" style="display:none;width:100%;border-radius:6px;margin-bottom:1rem;">
            <audio id="error-sound" src="magicword.mp3" preload="auto"></audio>

            <form id="login-form" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" autocomplete="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="fa fa-sign-in me-1"></i> Sign In
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">&larr; Back to portfolio</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) return;
            document.getElementById('error-alert').classList.remove('d-none');

            const gif = document.getElementById('error-gif');
            gif.style.display = 'block';
            gif.src = '';
            gif.src = 'error_gif.gif';

            const sound = document.getElementById('error-sound');
            sound.currentTime = 0;
            sound.play();

            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        });
    </script>
</body>
</html>
